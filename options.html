<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume Tailor — Extension settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="header-text">
          <h1 class="title">Resume Tailor</h1>
          <p class="subtitle">API key &amp; model</p>
        </div>
      </header>

      <section class="card" aria-labelledby="card-heading">
        <h2 id="card-heading" class="card-title">Provider &amp; model</h2>
        <p class="hint">
          Resume Tailor uses your key to tailor the built-in resume and to generate cover letters. Nothing is sent to our
          servers—only to the provider you choose. Keys stay in this browser profile (<code>chrome.storage.local</code>).
        </p>

        <div class="field">
          <label class="field-label" for="provider-select">Provider</label>
          <div class="select-wrap">
            <select id="provider-select" class="field-input field-select">
              <option value="openai">OpenAI</option>
              <option value="anthropic">Anthropic (Claude)</option>
            </select>
          </div>
        </div>

        <div class="provider-logos" aria-hidden="true">
          <span class="provider-logo provider-logo-openai">OpenAI</span>
          <span class="provider-logo provider-logo-anthropic">Anthropic</span>
        </div>

        <div class="field">
          <label class="field-label" for="api-key">API key</label>
          <input
            id="api-key"
            class="field-input"
            type="password"
            autocomplete="off"
            spellcheck="false"
            placeholder="sk-… or anthropic key…"
          />
          <p id="api-key-help" class="field-hint"></p>
        </div>

        <div class="field">
          <label class="field-label" for="model-select">Model</label>
          <div class="select-wrap">
            <select id="model-select" class="field-input field-select" aria-describedby="model-hint">
              <option value="__custom__">Custom model ID…</option>
            </select>
          </div>
          <p id="model-hint" class="field-hint"></p>
        </div>

        <div id="model-custom-wrap" class="field field-nested" hidden>
          <label class="field-label" for="model-custom">Custom model ID</label>
          <input
            id="model-custom"
            class="field-input"
            type="text"
            spellcheck="false"
            placeholder="e.g. gpt-4o-2024-08-06"
          />
        </div>

        <button id="save" class="btn-primary" type="button">Save</button>
        <p id="status" class="status" role="status"></p>
      </section>
    </div>
    <script src="options.js"></script>
  </body>
</html>
