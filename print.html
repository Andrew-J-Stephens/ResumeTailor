<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume Tailor — Print preview</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #status {
        padding: 10px 14px;
        font-size: 13px;
        background: #111827;
        color: #e5e7eb;
      }
      #status[data-kind="error"] {
        background: #7f1d1d;
        color: #fecaca;
      }
      #preview {
        width: 210mm;
        min-height: 297mm;
        margin: 16px auto;
        border: 1px solid #ddd;
        background: white;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      }
      @media print {
        #status { display: none; }
        #preview {
          width: auto;
          min-height: auto;
          margin: 0;
          border: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="status" data-kind="info">Preparing A4 print preview…</div>
    <iframe id="preview" title="Resume preview"></iframe>
    <script src="print.js"></script>
  </body>
  </html>
